spring.application.name=car-consumer
grpc.server.port=9090
spring.data.mongodb.uri=mongodb://localhost:27017/cartelemetry

spring.kafka.bootstrap-servers=localhost:29092
spring.kafka.consumer.group-id=car-telemetry-group
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.apache.kafka.common.serialization.ByteArrayDeserializer
spring.kafka.consumer.auto-offset-reset=earliest
# Kafka
kafka.topic.positions=car-positions
kafka.topic.diagnostics=car-diagnostics
kafka.consumer.group-id=car-telemetry-group

# Analytics
analytics.trip.timeout.ms=300000
analytics.speed.limit.kph=120.0
analytics.speed.anomaly.kph=300.0
analytics.schedule.rate=600000
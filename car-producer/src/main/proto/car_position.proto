syntax = "proto3";

option java_package = "com.cartelemetry.proto";
option java_outer_classname = "CarPositionProto";
option java_multiple_files = true;

package cartelemetry;

message GpsLocation {
    double latitude = 1;
    double longitude = 2;
}

message CarPosition {
    string vin = 1;
    int64 timestamp = 2;
    GpsLocation location = 3;
    double speed = 4;
    double engine_temp = 5;
    double gas_tank_level = 6;
    string obd2_error_code = 7;
}

message CarPositionResponse {
    bool success = 1;
    string message = 2;
}

service CarPositionService {
    rpc SendCarPosition (CarPosition) returns (CarPositionResponse);
}